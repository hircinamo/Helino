<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web3 Elite Monitor | ETH & BASE</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --dark-gold: #B8860B;
            --white: #FFFFFF;
            --bg: #FDFBF7;
            --border: 2px solid #222;
        }

        body {
            margin: 0;
            background-color: var(--bg);
            font-family: 'Montserrat', sans-serif;
            color: #333;
        }

        /* প্রফেশনাল হেডার */
        header {
            background: var(--white);
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: var(--border);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .brand {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* মেনু ও সেটিংস */
        .settings-btn {
            background: var(--gold);
            border: var(--border);
            padding: 10px 20px;
            cursor: pointer;
            font-weight: 600;
            border-radius: 5px;
            transition: 0.3s;
        }

        .settings-btn:hover { background: var(--dark-gold); color: white; }

        /* সেটিংস প্যানেল */
        #api-panel {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            border: var(--border);
            padding: 30px;
            z-index: 1000;
            box-shadow: 15px 15px 0px var(--gold);
            width: 90%;
            max-width: 450px;
        }

        .input-box {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        /* ড্যাশবোর্ড কার্ড */
        .main-container { padding: 40px 5%; }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            border: var(--border);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 6px 6px 0px #eee;
        }

        .balance-title { font-size: 14px; color: #888; text-transform: uppercase; }
        .balance-value { font-size: 32px; font-weight: 700; color: var(--gold); margin: 10px 0; }

        /* ট্রানজেকশন টেবিল */
        .tx-container {
            margin-top: 30px;
            background: white;
            border: var(--border);
            border-radius: 15px;
            overflow: hidden;
        }

        .tx-header { background: #f9f9f9; padding: 15px; border-bottom: var(--border); font-weight: 700; }
        
        .tx-row {
            padding: 15px;
            border-bottom: 1px solid #eee;
            display: grid;
            grid-template-columns: 1fr 2fr 1fr 1fr;
            align-items: center;
            font-size: 13px;
        }

        .tx-row:hover { background: #fffcf5; }

        .tag {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
        }
        .tag-eth { background: #E0E7FF; color: #4338CA; }
        .tag-base { background: #DBEAFE; color: #1E40AF; }

        .link-btn { color: var(--gold); text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

<header>
    <div class="brand">Web3 Elite Monitor</div>
    <button class="settings-btn" onclick="toggleSettings()">⚙️ SETTINGS</button>
</header>

<div id="api-panel">
    <h3>Secure Configuration</h3>
    <p style="font-size:12px; color:red;">Keys are stored locally in your browser.</p>
    <label>Ethereum Alchemy Key</label>
    <input type="password" id="eth-key" class="input-box" placeholder="Enter ETH API Key">
    <label>Base Alchemy Key</label>
    <input type="password" id="base-key" class="input-box" placeholder="Enter Base API Key">
    <label>Telegram Bot Token</label>
    <input type="password" id="tg-token" class="input-box" placeholder="Enter Telegram Token">
    <label>Telegram Chat ID</label>
    <input type="text" id="tg-id" class="input-box" placeholder="Enter Chat ID">
    <button class="settings-btn" style="width:100%" onclick="saveSettings()">SAVE & INITIALIZE</button>
</div>

<div class="main-container">
    <div class="card" style="margin-bottom: 30px; text-align: center;">
        <h3 style="margin-top:0">Enter Wallet to Track</h3>
        <input type="text" id="wallet-addr" class="input-box" style="max-width: 500px; text-align: center;" placeholder="0x...">
        <br><br>
        <button class="settings-btn" onclick="startMonitor()">START LIVE MONITORING</button>
    </div>

    <div class="dashboard-grid">
        <div class="card">
            <div class="balance-title">Ethereum Balance</div>
            <div id="eth-bal" class="balance-value">0.00 ETH</div>
            <span class="tag tag-eth">Network: Ethereum</span>
        </div>
        <div class="card">
            <div class="balance-title">Base Balance</div>
            <div id="base-bal" class="balance-value">0.00 ETH</div>
            <span class="tag tag-base">Network: Base</span>
        </div>
    </div>

    <div class="tx-container">
        <div class="tx-header">Recent Transactions (Real-Time)</div>
        <div id="tx-list">
            <div style="padding: 20px; text-align: center; color: #999;">
                No active tracking. Configure APIs and enter wallet address.
            </div>
        </div>
    </div>
</div>

<script>
    function toggleSettings() {
        const panel = document.getElementById('api-panel');
        panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
    }

    function saveSettings() {
        localStorage.setItem('eth_api', document.getElementById('eth-key').value);
        localStorage.setItem('base_api', document.getElementById('base-key').value);
        localStorage.setItem('tg_token', document.getElementById('tg-token').value);
        localStorage.setItem('tg_id', document.getElementById('tg-id').value);
        alert('Configuration saved securely!');
        toggleSettings();
    }

    async function sendTelegram(msg) {
        const token = localStorage.getItem('tg_token');
        const id = localStorage.getItem('tg_id');
        if(!token || !id) return;
        fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${id}&text=${encodeURIComponent(msg)}`);
    }

    async function startMonitor() {
        const addr = document.getElementById('wallet-addr').value;
        const ethKey = localStorage.getItem('eth_api');
        const baseKey = localStorage.getItem('base_api');

        if(!addr || !ethKey || !baseKey) {
            alert('Please check Address and API keys in settings!');
            return;
        }

        document.getElementById('tx-list').innerHTML = '<div style="padding:20px">Fetching live data...</div>';
        
        // Telegram notification for successful start
        sendTelegram(`🚀 Monitoring Started\nWallet: ${addr}\nNetworks: ETH, BASE`);

        // বাস্তব ট্রানজেকশন ডাটা রেন্ডারিং (Demo logic for UI structure)
        renderTransaction(addr, "Ethereum", "0.05", "0xabc...123", "0xdef...456", "Transfer", "https://etherscan.io/tx/...");
        renderTransaction(addr, "Base", "0.02", "0x789...000", "0x111...222", "Mint", "https://basescan.org/tx/...");
    }

    function renderTransaction(wallet, network, val, from, to, method, scanLink) {
        const list = document.getElementById('tx-list');
        if(list.innerHTML.includes('No active tracking')) list.innerHTML = '';
        
        const row = document.createElement('div');
        row.className = 'tx-row';
        row.innerHTML = `
            <div><span class="tag ${network === 'Ethereum' ? 'tag-eth' : 'tag-base'}">${network}</span></div>
            <div>
                <b>From:</b> ${from.slice(0,6)}...${from.slice(-4)} <br>
                <b>To:</b> ${to.slice(0,6)}...${to.slice(-4)}
            </div>
            <div><b>${val} ETH</b><br><small>${method}</small></div>
            <div><a href="${scanLink}" target="_blank" class="link-btn">VIEW SCAN ↗</a></div>
        `;
        list.prepend(row);
    }
</script>

</body>
</html>
