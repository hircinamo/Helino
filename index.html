<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAHAL Web3 Luxury Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Outfit:wght@300;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
    
    <style>
        :root {
            --gold: #D4AF37;
            --dark-gold: #996515;
            --white: #FFFFFF;
            --bg: #FDFCF0;
            --black: #000000;
        }

        body {
            background-color: var(--bg);
            font-family: 'Outfit', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* Luxury Cartoon Header */
        .header {
            background: var(--white);
            border-bottom: 5px solid var(--black);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 8px 0px var(--gold);
        }

        .brand-name {
            font-family: 'Fredoka One', cursive;
            font-size: 28px;
            color: var(--black);
            text-shadow: 2px 2px var(--gold);
        }

        /* Container & Cards */
        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
        }

        .main-card {
            background: var(--white);
            border: 4px solid var(--black);
            border-radius: 25px;
            padding: 30px;
            box-shadow: 12px 12px 0px var(--black);
            margin-bottom: 40px;
        }

        .input-box {
            width: 100%;
            padding: 15px;
            border: 3px solid var(--black);
            border-radius: 12px;
            font-size: 16px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        .btn-gold {
            background: var(--gold);
            color: var(--white);
            border: 3px solid var(--black);
            padding: 15px 30px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            border-radius: 12px;
            box-shadow: 5px 5px 0px var(--black);
            transition: 0.2s;
        }

        .btn-gold:active {
            box-shadow: 0px 0px 0px;
            transform: translate(5px, 5px);
        }

        /* Transaction List UI */
        .tx-card {
            background: #fff;
            border: 3px solid var(--black);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 6px 6px 0px var(--gold);
        }

        .tx-info { display: flex; flex-direction: column; gap: 5px; }
        .tx-amount { font-weight: 700; font-size: 18px; color: var(--dark-gold); }
        .tx-address { font-size: 12px; color: #666; font-family: monospace; }
        .badge {
            padding: 5px 12px;
            border: 2px solid #000;
            border-radius: 20px;
            font-weight: bold;
            font-size: 12px;
        }

        /* Settings Panel */
        #settings-panel {
            background: #fff;
            border: 4px solid var(--black);
            position: fixed;
            top: 10%; left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            padding: 25px;
            display: none;
            width: 90%;
            max-width: 450px;
            border-radius: 20px;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .header { flex-direction: column; gap: 15px; }
            .tx-card { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="brand-name">NAHAL WEB3</div>
    <button class="btn-gold" style="font-size: 14px;" onclick="toggleSettings()">🔑 API Config</button>
</div>

<div class="container">
    <div class="main-card">
        <h2 style="margin-top: 0;">💎 Wallet Inspector</h2>
        <input type="text" id="wallet-addr" class="input-box" placeholder="Enter ETH or Base Address (0x...)">
        <button class="btn-gold" style="width: 100%;" onclick="startTracking()">Scan All Transactions</button>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px;">
        <div class="main-card" style="margin:0; text-align: center; background: #fffdf0;">
            <h3>ETH Balance</h3>
            <h2 id="eth-bal" style="color:var(--dark-gold);">0.00</h2>
        </div>
        <div class="main-card" style="margin:0; text-align: center; background: #f0f7ff;">
            <h3>Base Balance</h3>
            <h2 id="base-bal" style="color:#0052ff;">0.00</h2>
        </div>
    </div>

    <div id="tx-container">
        <h3 style="margin-left: 10px;">Recent Activity Logs:</h3>
        <div id="tx-list">
            <div style="text-align: center; padding: 40px; color: #888;">No data found. Setup API keys and start scan.</div>
        </div>
    </div>
</div>

<div id="settings-panel">
    <h3>Secure API Management</h3>
    <label>Ethereum Alchemy Key</label>
    <input type="password" id="eth-key" class="input-box" placeholder="ETH Alchemy Key">
    <label>Base Alchemy Key</label>
    <input type="password" id="base-key" class="input-box" placeholder="Base Alchemy Key">
    <label>Telegram Token & ID</label>
    <input type="password" id="tg-token" class="input-box" placeholder="Bot Token">
    <input type="text" id="tg-id" class="input-box" placeholder="Chat ID">
    <button class="btn-gold" onclick="saveConfig()">Save All Settings</button>
</div>

<script>
    function toggleSettings() {
        const p = document.getElementById('settings-panel');
        p.style.display = p.style.display === 'block' ? 'none' : 'block';
    }

    function saveConfig() {
        localStorage.setItem('eth_api', document.getElementById('eth-key').value);
        localStorage.setItem('base_api', document.getElementById('base-key').value);
        localStorage.setItem('tg_token', document.getElementById('tg-token').value);
        localStorage.setItem('tg_id', document.getElementById('tg-id').value);
        alert('Config Saved Securely!');
        toggleSettings();
    }

    async function sendTelegram(msg) {
        const token = localStorage.getItem('tg_token');
        const id = localStorage.getItem('tg_id');
        if(!token || !id) return;
        fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${id}&text=${encodeURIComponent(msg)}`);
    }

    async function startTracking() {
        const addr = document.getElementById('wallet-addr').value;
        const ethApi = localStorage.getItem('eth_api');
        const baseApi = localStorage.getItem('base_api');

        if(!addr || !ethApi || !baseApi) {
            alert('Please check Address and API Keys!');
            return;
        }

        const listDiv = document.getElementById('tx-list');
        listDiv.innerHTML = "Fetching Data... Please wait.";

        try {
            // Fetching from ETH and Base via Alchemy
            const ethProvider = new ethers.providers.JsonRpcProvider(`https://eth-mainnet.g.alchemy.com/v2/${ethApi}`);
            const baseProvider = new ethers.providers.JsonRpcProvider(`https://base-mainnet.g.alchemy.com/v2/${baseApi}`);

            const ethBal = await ethProvider.getBalance(addr);
            const baseBal = await baseProvider.getBalance(addr);

            document.getElementById('eth-bal').innerText = parseFloat(ethers.utils.formatEther(ethBal)).toFixed(4) + " ETH";
            document.getElementById('base-bal').innerText = parseFloat(ethers.utils.formatEther(baseBal)).toFixed(4) + " ETH";

            // In a real scenario, Alchemy "Asset Transferred" API is best for history. 
            // Here we simulate the fetch result to show the UI structure
            renderTransactions(addr);
            sendTelegram(`🔔 Tracking Started for: ${addr}\nETH: ${ethers.utils.formatEther(ethBal)} \nBase: ${ethers.utils.formatEther(baseBal)}`);
        } catch (e) {
            listDiv.innerHTML = "Error: Invalid API keys or Network Issue.";
        }
    }

    function renderTransactions(myAddr) {
        const listDiv = document.getElementById('tx-list');
        // Mock data to demonstrate the UI - This is where Alchemy Data would go
        const data = [
            { net: 'BASE', from: myAddr, to: '0x742d...444', amt: '0.05', type: 'Sent', date: '2 mins ago' },
            { net: 'ETH', from: '0x111...aaa', to: myAddr, amt: '1.20', type: 'Received', date: '1 hour ago' }
        ];

        listDiv.innerHTML = '';
        data.forEach(tx => {
            listDiv.innerHTML += `
                <div class="tx-card">
                    <div class="tx-info">
                        <span class="badge" style="background:${tx.net==='ETH' ? '#f0e6ff':'#0052ff; color:#fff'}">${tx.net}</span>
                        <span class="tx-amount">${tx.type}: ${tx.amt} ETH</span>
                        <span class="tx-address">From: ${tx.from}</span>
                        <span class="tx-address">To: ${tx.to}</span>
                    </div>
                    <div style="text-align:right">
                        <div style="font-size:12px; color:#888">${tx.date}</div>
                        <div style="color:green; font-weight:bold">Success</div>
                    </div>
                </div>
            `;
        });
    }
</script>

</body>
</html>
