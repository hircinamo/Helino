<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nahal | Web3 Gold Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <style>
        :root {
            --gold: #D4AF37;
            --dark-gold: #996515;
            --white: #FFFFFF;
            --bg: #FDFDFD;
            --glass: rgba(255, 255, 255, 0.9);
            --border: 4px solid #000;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* Luxury Header */
        header {
            background: var(--white);
            border-bottom: var(--border);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo { font-weight: 700; font-size: 1.5rem; color: #000; letter-spacing: -1px; }
        .logo span { color: var(--gold); }

        /* Dashboard Container */
        .main-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 20px;
        }

        .grid-layout {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
        }

        /* Card Design - Cartoon Professional Mix */
        .card {
            background: var(--white);
            border: var(--border);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 10px 10px 0px #000;
            transition: 0.2s ease;
        }

        .card:hover { transform: translate(-3px, -3px); box-shadow: 15px 15px 0px var(--gold); }

        .balance-title { color: #666; font-size: 0.9rem; text-transform: uppercase; font-weight: 700; }
        .balance-amount { font-size: 2.5rem; font-weight: 700; margin: 10px 0; }

        /* Input & Buttons */
        input {
            width: 100%;
            padding: 15px;
            border: var(--border);
            border-radius: 12px;
            margin-bottom: 15px;
            font-size: 1rem;
            box-sizing: border-box;
        }

        .btn-main {
            background: var(--gold);
            color: #000;
            border: var(--border);
            padding: 15px 30px;
            font-weight: 700;
            cursor: pointer;
            border-radius: 12px;
            width: 100%;
            box-shadow: 5px 5px 0px #000;
        }

        .btn-main:active { box-shadow: 0px 0px 0px; transform: translate(5px, 5px); }

        /* Transaction List */
        .tx-list { margin-top: 20px; max-height: 400px; overflow-y: auto; }
        .tx-item {
            border-bottom: 2px solid #eee;
            padding: 15px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .tag {
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 0.7rem;
            font-weight: 700;
            border: 2px solid #000;
        }

        .tag-eth { background: #e0e7ff; }
        .tag-base { background: #0052ff; color: white; }
        .tag-monad { background: #836efb; color: white; }

        /* Settings Modal */
        #settings-ui {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
        }

        .modal-content {
            background: white;
            border: var(--border);
            width: 90%;
            max-width: 500px;
            margin: 50px auto;
            padding: 30px;
            border-radius: 24px;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">NAHAL <span>WEB3</span></div>
    <button class="btn-main" style="width: auto; padding: 10px 20px;" onclick="openSettings()">SETTINGS</button>
</header>

<div class="main-container">
    <div class="grid-layout">
        <div class="card">
            <h3>Wallet Tracker</h3>
            <p style="font-size: 0.8rem; color: #777;">Monitor ETH, Base, and Monad live.</p>
            <input type="text" id="wallet-address" placeholder="Enter Wallet Address (0x...)">
            <button class="btn-main" onclick="initMonitor()">START LIVE FEED</button>
        </div>

        <div class="card">
            <div class="balance-title">Total Portfolio Value</div>
            <div class="balance-amount" id="total-val">$0.00</div>
            <div id="chain-balances" style="font-size: 0.9rem; font-weight: 500;">
                ETH: 0 | BASE: 0 | MONAD: 0
            </div>
        </div>
    </div>

    <div class="card" style="margin-top: 30px;">
        <h3>Live Transaction History</h3>
        <div class="tx-list" id="tx-log">
            <p style="color: #999;">Waiting for connection... Transactions will appear here in real-time.</p>
        </div>
    </div>
</div>

<div id="settings-ui">
    <div class="modal-content">
        <h2 style="margin-top:0">🔑 API Configuration</h2>
        <label><b>Ethereum Alchemy URL</b></label>
        <input type="password" id="eth-key" placeholder="https://eth-mainnet.g.alchemy.com/v2/...">
        
        <label><b>Base Alchemy URL</b></label>
        <input type="password" id="base-key" placeholder="https://base-mainnet.g.alchemy.com/v2/...">

        <label><b>Monad RPC URL</b></label>
        <input type="password" id="monad-key" placeholder="Monad RPC URL">

        <label><b>Telegram Bot Token</b></label>
        <input type="password" id="tg-token" placeholder="Token">
        
        <label><b>Telegram Chat ID</b></label>
        <input type="text" id="tg-chat" placeholder="Chat ID">

        <button class="btn-main" onclick="saveSettings()">SAVE & REBOOT</button>
        <button class="btn-main" style="background:#eee; margin-top:10px;" onclick="openSettings()">CLOSE</button>
    </div>
</div>

<script>
    function openSettings() {
        const ui = document.getElementById('settings-ui');
        ui.style.display = ui.style.display === 'block' ? 'none' : 'block';
        
        // Fill existing keys
        document.getElementById('eth-key').value = localStorage.getItem('eth_api') || '';
        document.getElementById('base-key').value = localStorage.getItem('base_api') || '';
        document.getElementById('monad-key').value = localStorage.getItem('monad_api') || '';
        document.getElementById('tg-token').value = localStorage.getItem('tg_token') || '';
        document.getElementById('tg-chat').value = localStorage.getItem('tg_chat') || '';
    }

    function saveSettings() {
        localStorage.setItem('eth_api', document.getElementById('eth-key').value);
        localStorage.setItem('base_api', document.getElementById('base-key').value);
        localStorage.setItem('monad_api', document.getElementById('monad-key').value);
        localStorage.setItem('tg_token', document.getElementById('tg-token').value);
        localStorage.setItem('tg_chat', document.getElementById('tg-chat').value);
        alert("Keys Saved Locally!");
        location.reload();
    }

    async function sendAlert(msg) {
        const token = localStorage.getItem('tg_token');
        const chat = localStorage.getItem('tg_chat');
        if(!token || !chat) return;
        fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat}&text=${encodeURIComponent(msg)}`);
    }

    async function initMonitor() {
        const addr = document.getElementById('wallet-address').value;
        if(!addr.startsWith('0x')) return alert("Invalid Address");

        document.getElementById('tx-log').innerHTML = "<b>[System]</b> Connecting to chains...";
        
        // Logic for fetching balances from 3 different APIs
        // we'll use a loop to check each provider saved in localStorage
        const chains = [
            { name: 'Ethereum', key: 'eth_api', tag: 'tag-eth' },
            { name: 'Base', key: 'base_api', tag: 'tag-base' },
            { name: 'Monad', key: 'monad_api', tag: 'tag-monad' }
        ];

        for (let chain of chains) {
            const rpc = localStorage.getItem(chain.key);
            if(!rpc) continue;

            try {
                const provider = new ethers.JsonRpcProvider(rpc);
                const bal = await provider.getBalance(addr);
                const formattedBal = ethers.formatEther(bal);
                
                // Add to UI
                addTxToUI(chain.name, `Initial Balance Check: ${formattedBal}`, chain.tag);
                
                // Real-time listener (WebSocket equivalent)
                provider.on("block", async (blockNumber) => {
                    const block = await provider.getBlock(blockNumber, true);
                    block.transactions.forEach(tx => {
                        if(tx.from.toLowerCase() === addr.toLowerCase() || (tx.to && tx.to.toLowerCase() === addr.toLowerCase())) {
                            const msg = `🔔 New Transaction on ${chain.name}!\nHash: ${tx.hash}\nValue: ${ethers.formatEther(tx.value)} ETH`;
                            addTxToUI(chain.name, `New Tx: ${tx.hash.substring(0,10)}...`, chain.tag);
                            sendAlert(msg);
                        }
                    });
                });
            } catch (e) {
                console.error("Error on " + chain.name, e);
            }
        }
    }

    function addTxToUI(chain, text, tagClass) {
        const log = document.getElementById('tx-log');
        const div = document.createElement('div');
        div.className = 'tx-item';
        div.innerHTML = `<span><span class="tag ${tagClass}">${chain}</span> ${text}</span> <span>${new Date().toLocaleTimeString()}</span>`;
        log.prepend(div);
    }
</script>

</body>
</html>
