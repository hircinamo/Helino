<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web3 Gold Tracker | Eth & Base</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #D4AF37;
            --gold-gradient: linear-gradient(135deg, #D4AF37 0%, #F4E0A1 100%);
            --white: #ffffff;
            --bg: #fafafa;
            --black-border: 3px solid #1a1a1a;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 0;
            color: #1a1a1a;
        }

        /* Luxury Header */
        header {
            background: var(--white);
            padding: 20px;
            text-align: center;
            border-bottom: var(--black-border);
            box-shadow: 0 10px 0px rgba(212, 175, 55, 0.1);
        }

        .gold-text {
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            font-size: 2.5rem;
            margin: 0;
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* Setup Section */
        .setup-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--white);
            border: var(--black-border);
            padding: 25px;
            border-radius: 24px;
            box-shadow: 10px 10px 0px var(--gold);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card:hover {
            transform: translate(-5px, -5px);
            box-shadow: 15px 15px 0px #000;
        }

        h3 { border-bottom: 2px solid var(--gold); padding-bottom: 10px; }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 12px;
            box-sizing: border-box;
            font-family: inherit;
        }

        .btn {
            background: var(--gold-gradient);
            border: 2px solid #000;
            color: #000;
            padding: 15px 30px;
            font-weight: 700;
            border-radius: 15px;
            cursor: pointer;
            width: 100%;
            box-shadow: 5px 5px 0px #000;
            text-transform: uppercase;
        }

        .btn:active { box-shadow: 0px 0px 0px; transform: translate(5px, 5px); }

        /* Transaction List */
        .tx-list {
            margin-top: 30px;
            max-height: 500px;
            overflow-y: auto;
        }

        .tx-item {
            background: #fff;
            border: 2px solid #000;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 12px;
            border: 1px solid #000;
        }

        .badge-eth { background: #e8dbff; }
        .badge-base { background: #0052ff; color: white; }

    </style>
</head>
<body>

<header>
    <h1 class="gold-text">NAHAL RECALLER V3</h1>
    <p>Premium Web3 Transaction Monitor</p>
</header>

<div class="container">
    <div class="setup-grid">
        <div class="card">
            <h3>🔑 API Configuration</h3>
            <input type="password" id="eth-api" placeholder="Ethereum Alchemy Key">
            <input type="password" id="base-api" placeholder="Base Alchemy Key">
            <input type="text" id="tg-id" placeholder="Telegram Chat ID">
            <button class="btn" onclick="saveSettings()">Save Configuration</button>
        </div>

        <div class="card">
            <h3>💳 Wallet Monitor</h3>
            <input type="text" id="wallet-addr" placeholder="Enter Wallet Address (0x...)">
            <p id="eth-bal">ETH Balance: 0.00</p>
            <p id="base-bal">Base Balance: 0.00</p>
            <button class="btn" onclick="startMonitoring()">Start Tracking</button>
        </div>
    </div>

    <div class="card">
        <h3>📊 Live Transactions & Activity</h3>
        <div id="tx-container" class="tx-list">
            <p style="text-align:center; color:#888;">No transactions to display. Enter API and Address to start.</p>
        </div>
    </div>
</div>

<script>
    let ethProvider, baseProvider;
    const tgToken = "5633369506:AAGCg8QULvQ6MgxcErIkpeetu1lkD_EkrS8";

    function saveSettings() {
        localStorage.setItem('eth_key', document.getElementById('eth-api').value);
        localStorage.setItem('base_key', document.getElementById('base-api').value);
        localStorage.setItem('tg_id', document.getElementById('tg-id').value);
        alert("Settings Saved Locally!");
    }

    async function sendTelegram(msg) {
        const chatId = localStorage.getItem('tg_id');
        if(!chatId) return;
        try {
            await fetch(`https://api.telegram.org/bot${tgToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(msg)}`);
        } catch(e) { console.error("TG Error", e); }
    }

    async function startMonitoring() {
        const addr = document.getElementById('wallet-addr').value;
        const ethKey = localStorage.getItem('eth_key');
        const baseKey = localStorage.getItem('base_key');

        if(!addr || !ethKey || !baseKey) {
            alert("Please fill all API keys and Wallet Address!");
            return;
        }

        // Initialize Providers
        ethProvider = new ethers.JsonRpcProvider(`https://eth-mainnet.g.alchemy.com/v2/${ethKey}`);
        baseProvider = new ethers.JsonRpcProvider(`https://base-mainnet.g.alchemy.com/v2/${baseKey}`);

        document.getElementById('tx-container').innerHTML = "<b>[System]</b> Monitoring started for Ethereum and Base...";
        
        // Initial Balance Check
        updateBalances(addr);

        // Real-time Listener (Ethereum)
        ethProvider.on("block", async (blockNumber) => {
            checkTransactions(ethProvider, addr, "Ethereum", "badge-eth");
        });

        // Real-time Listener (Base)
        baseProvider.on("block", async (blockNumber) => {
            checkTransactions(baseProvider, addr, "Base", "badge-base");
        });
    }

    async function updateBalances(addr) {
        try {
            const eBal = await ethProvider.getBalance(addr);
            const bBal = await baseProvider.getBalance(addr);
            document.getElementById('eth-bal').innerText = `ETH Balance: ${ethers.formatEther(eBal)} ETH`;
            document.getElementById('base-bal').innerText = `Base Balance: ${ethers.formatEther(bBal)} ETH`;
        } catch (e) { console.error(e); }
    }

    async function checkTransactions(provider, addr, network, badgeClass) {
        const block = await provider.getBlock("latest", true);
        if (block && block.prefetchedTransactions) {
            block.prefetchedTransactions.forEach(tx => {
                if (tx.from.toLowerCase() === addr.toLowerCase() || (tx.to && tx.to.toLowerCase() === addr.toLowerCase())) {
                    addTxToUI(tx, network, badgeClass);
                    sendTelegram(`🚨 New Transaction on ${network}!\nFrom: ${tx.from}\nTo: ${tx.to}\nValue: ${ethers.formatEther(tx.value)} ETH`);
                    updateBalances(addr);
                }
            });
        }
    }

    function addTxToUI(tx, network, badgeClass) {
        const container = document.getElementById('tx-container');
        const html = `
            <div class="tx-item">
                <div>
                    <span class="badge ${badgeClass}">${network}</span>
                    <strong>${ethers.formatEther(tx.value)} ETH</strong>
                </div>
                <div style="font-size:12px; color:#555;">
                    To: ${tx.to ? tx.to.substring(0,10) : "Contract"}...
                </div>
            </div>
        `;
        container.insertAdjacentHTML('afterbegin', html);
    }
</script>

</body>
</html>
