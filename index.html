<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nahal Web3 Pro - Gold Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/alchemy-sdk@latest/dist/alchemy-sdk.bundle.iife.js"></script>
    <style>
        :root {
            --gold: #FFD700;
            --dark-gold: #B8860B;
            --white: #FFFFFF;
            --bg: #FDFDFD;
            --black: #1A1A1A;
            --border: 4px solid #1A1A1A;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 0;
            color: var(--black);
            overflow-x: hidden;
        }

        /* Luxury Header */
        .header {
            background: var(--white);
            border-bottom: var(--border);
            padding: 25px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 28px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -1px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .gold-pill {
            background: var(--gold);
            padding: 5px 15px;
            border: var(--border);
            box-shadow: 4px 4px 0px var(--black);
            font-size: 14px;
        }

        /* Hero Section */
        .main-container {
            max-width: 1300px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .wallet-card {
            background: var(--white);
            border: var(--border);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 12px 12px 0px var(--gold);
            text-align: center;
            margin-bottom: 50px;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        input {
            width: 80%;
            max-width: 600px;
            padding: 20px;
            font-size: 18px;
            border: var(--border);
            border-radius: 15px;
            margin-bottom: 20px;
            outline: none;
            box-shadow: 6px 6px 0px #eee;
        }

        .btn-main {
            background: var(--gold);
            padding: 20px 40px;
            font-size: 20px;
            font-weight: 700;
            border: var(--border);
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 6px 6px 0px var(--black);
            transition: all 0.2s;
        }

        .btn-main:active {
            transform: translate(4px, 4px);
            box-shadow: 2px 2px 0px var(--black);
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 50px;
        }

        .stat-box {
            background: var(--white);
            border: var(--border);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 8px 8px 0px var(--black);
            position: relative;
        }

        /* Transaction Table */
        .table-container {
            background: var(--white);
            border: var(--border);
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 10px 10px 0px var(--gold);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: var(--black);
            color: var(--gold);
            padding: 20px;
            text-align: left;
        }

        td {
            padding: 18px;
            border-bottom: 2px solid #eee;
        }

        tr:hover { background: #fffdf0; }

        /* Notification Settings */
        .settings-btn {
            background: var(--white);
            border: var(--border);
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
        }

        #settings-modal {
            display: none;
            position: fixed;
            top: 20%; left: 50%;
            transform: translateX(-50%);
            background: white;
            border: var(--border);
            padding: 30px;
            z-index: 1000;
            width: 350px;
            box-shadow: 15px 15px 0px var(--black);
        }

        .loader {
            display: none;
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--gold);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 10px auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">
        👑 NAHAL <span class="gold-pill">WEB3 PRO</span>
    </div>
    <button class="settings-btn" onclick="toggleSettings()">⚙️ API Settings</button>
</div>

<div class="main-container">
    <div class="wallet-card">
        <h1>Luxury Asset Tracker</h1>
        <p>Monitor transactions across all major networks in real-time.</p>
        <input type="text" id="walletInput" placeholder="Enter Address (0x...)">
        <br>
        <button class="btn-main" onclick="startTracking()">START MONITORING</button>
        <div class="loader" id="loader"></div>
    </div>

    <div class="stats-grid">
        <div class="stat-box">
            <h3>💰 Total Balance</h3>
            <h1 id="balanceText" style="color: var(--dark-gold);">$0.00</h1>
        </div>
        <div class="stat-box">
            <h3>🔔 Telegram Status</h3>
            <h2 id="tgStatus">Inactive</h2>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Type</th>
                    <th>Network</th>
                    <th>Amount</th>
                    <th>To / From</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="txBody">
                </tbody>
        </table>
    </div>
</div>

<div id="settings-modal">
    <h3>Configure Secure API</h3>
    <p style="font-size: 11px;">Data is saved locally in your browser.</p>
    <input type="password" id="apiKey" placeholder="Alchemy API Key" style="width: 90%; font-size: 12px;">
    <input type="password" id="tgToken" placeholder="Telegram Bot Token" style="width: 90%; font-size: 12px;">
    <input type="text" id="tgChat" placeholder="Telegram Chat ID" style="width: 90%; font-size: 12px;">
    <button class="btn-main" style="font-size: 14px; padding: 10px;" onclick="saveSettings()">SAVE CONFIG</button>
</div>

<script>
    function toggleSettings() {
        const m = document.getElementById('settings-modal');
        m.style.display = m.style.display === 'block' ? 'none' : 'block';
    }

    function saveSettings() {
        localStorage.setItem('alc_key', document.getElementById('apiKey').value);
        localStorage.setItem('tg_token', document.getElementById('tgToken').value);
        localStorage.setItem('tg_chat', document.getElementById('tgChat').value);
        alert('Settings Locked Securely!');
        toggleSettings();
        location.reload();
    }

    async function startTracking() {
        const address = document.getElementById('walletInput').value;
        const apiKey = localStorage.getItem('alc_key');
        
        if (!address || !apiKey) {
            alert('Please add API Key in Settings and enter a Wallet Address!');
            return;
        }

        document.getElementById('loader').style.display = 'block';
        
        // Alchemy Setup
        const settings = { apiKey: apiKey, network: "eth-mainnet" };
        const alchemy = new alchemy.Alchemy(settings);

        try {
            // 1. Fetch Balance
            const balance = await alchemy.core.getBalance(address, "latest");
            const ethBalance = parseFloat(ethers.utils.formatEther(balance)).toFixed(4);
            document.getElementById('balanceText').innerText = ethBalance + " ETH";

            // 2. Fetch Transactions
            const txs = await alchemy.core.getAssetTransfers({
                fromBlock: "0x0",
                fromAddress: address,
                category: ["external", "erc20", "nft"],
                maxCount: 10
            });

            renderTransactions(txs.transfers);
            
            // Telegram Notification
            sendNotify("Wallet Scan Complete for: " + address + "\nBalance: " + ethBalance + " ETH");

        } catch (err) {
            console.error(err);
            alert("Error fetching data. Check your API Key.");
        }
        document.getElementById('loader').style.display = 'none';
    }

    function renderTransactions(transfers) {
        const body = document.getElementById('txBody');
        body.innerHTML = '';
        
        transfers.forEach(tx => {
            const row = `<tr>
                <td><b>${tx.category.toUpperCase()}</b></td>
                <td>Mainnet</td>
                <td style="color:var(--dark-gold)">${tx.value.toFixed(4)} ${tx.asset}</td>
                <td>${tx.to.substring(0,6)}...${tx.to.substring(tx.to.length-4)}</td>
                <td><span class="gold-pill" style="box-shadow:none; font-size:10px;">SUCCESS</span></td>
            </tr>`;
            body.innerHTML += row;
        });
    }

    async function sendNotify(msg) {
        const token = localStorage.getItem('tg_token');
        const chat = localStorage.getItem('tg_chat');
        if(token && chat) {
            await fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat}&text=${encodeURIComponent(msg)}`);
        }
    }

    window.onload = () => {
        if(localStorage.getItem('tg_token')) document.getElementById('tgStatus').innerText = "Active ✅";
    }
</script>

</body>
</html>
